# Газетир RU↔EN (ЭТАП 2). Каноны с алиасами.
# Поля записи:
#   type, canon,
#   aliases[]         — RU-варианты/аббревиатуры (регистр учитывается ORTH-ярусом при наличии заглавных/латиницы),
#   aliases_en[]      — EN, lowercase-матч (НЕ клади сюда короткие омонимы: co/u/mg/ag — ловят мусор),
#   symbols[]         — символы элементов, ORTH регистрозависимо + word-boundary (Co, Fe — не co/fe),
#   symbols_guarded[] — символы-омонимы англ. слов (S/As/V): матчатся ТОЛЬКО рядом с числом/%/г-т
#                       или в списке через запятую с другими символами,
#   aliases_infl[]    — косвенные падежи топонимов (LEMMA-ярус, для Facility; гео-триггер сохраняется),
#   geo               — для Facility.
# type ∈ {Material, Phase, Process, Equipment, Facility, Condition, Domain, Organization}

